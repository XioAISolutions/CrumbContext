name: Benchmark result
description: Share a reproducible benchmark, regression, or model/provider comparison
title: "[Benchmark]: "
body:
  - type: input
    id: version
    attributes:
      label: CrumbContext version or commit
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Setup
      description: Model, provider, policy, fixture, command, and environment. Do not include secrets.
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Results
      description: Include token usage, latency, task quality, and exact-anchor recall where available.
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Reproduction artifacts
      description: Link or paste a minimal synthetic fixture and plan.json.
