name: Apply Fable Mythos support

on:
  push:
    branches:
      - claude/repo-improvements-fable-mythos-rjp798
    paths:
      - scripts/fable-mythos-trigger.txt
      - .github/workflows/apply-fable-mythos.yml
  pull_request:
    paths:
      - scripts/.fable_payload_*
      - scripts/fable-mythos-trigger.txt
      - .github/workflows/apply-fable-mythos.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      migration_status: ${{ steps.migrate.outputs.status }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || 'claude/repo-improvements-fable-mythos-rjp798' }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Capture reconstruction and migration
        id: migrate
        run: |
          set +e
          {
            cat scripts/.fable_payload_1 scripts/.fable_payload_2 scripts/.fable_payload_3 scripts/.fable_payload_4 > /tmp/fable-migration.b64
            base64 -d /tmp/fable-migration.b64 > /tmp/apply_fable_mythos.py
            python -m py_compile /tmp/apply_fable_mythos.py
            python /tmp/apply_fable_mythos.py
          } > /tmp/fable-migration.log 2>&1
          status=$?
          echo "$status" > /tmp/fable-migration.status
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Export migration diagnostic
        uses: actions/upload-artifact@v7
        with:
          name: fable-migration-${{ github.sha }}
          path: |
            /tmp/fable-migration.log
            /tmp/fable-migration.status
          if-no-files-found: error
          retention-days: 3
      - name: Install test dependencies
        if: steps.migrate.outputs.status == '0'
        run: python -m pip install -e '.[dev]'
      - name: Run full offline suite
        if: steps.migrate.outputs.status == '0'
        run: python -m pytest
      - name: Run deterministic benchmark
        if: steps.migrate.outputs.status == '0'
        run: |
          crumbcontext benchmark --out /tmp/fable-proof
          python -c "import json; d=json.load(open('/tmp/fable-proof/benchmark.json')); assert d['passed']"
      - name: Inspect Fable payload example
        if: steps.migrate.outputs.status == '0'
        run: |
          cd /tmp
          python "$GITHUB_WORKSPACE/examples/python/build_anthropic_payload.py" --out /tmp/anthropic-example > /tmp/anthropic-payload.json
          python - <<'PY'
          import json

          payload = json.load(open('/tmp/anthropic-payload.json'))
          assert payload['model'] == 'claude-fable-5'
          assert payload['max_tokens'] == 4096
          assert payload['fallbacks'] == [{'model': 'claude-opus-4-8'}]

          def walk(value):
              if isinstance(value, dict):
                  yield value
                  for child in value.values():
                      yield from walk(child)
              elif isinstance(value, list):
                  for child in value:
                      yield from walk(child)

          marked = [item for item in walk(payload) if 'cache_control' in item]
          assert len(marked) <= 4
          assert marked
          assert all(item['cache_control'].get('ttl') == '1h' for item in marked)
          PY
      - name: Verify frontier vision plan
        if: steps.migrate.outputs.status == '0'
        run: |
          crumbcontext analyze examples/transcript.json --profile frontier-vision > /tmp/frontier-plan.json
          python - <<'PY'
          import json

          plan = json.load(open('/tmp/frontier-plan.json'))
          routing = plan.get('routing', {})
          config = routing.get('config', plan.get('resolved_config', {}))
          profile = routing.get('profile', plan.get('profile_name'))
          assert config['image_width'] == 2576
          assert config['image_height'] == 1196
          assert config['image_page_chars'] == 24000
          assert profile == 'frontier-vision'
          PY
      - name: Commit permanent implementation
        if: steps.migrate.outputs.status == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            README.md ROADMAP.md CHANGELOG.md \
            docs/ANTHROPIC.md docs/ROUTING_PROFILES.md \
            examples/python/build_anthropic_payload.py \
            crumbcontext/__init__.py crumbcontext/cli.py crumbcontext/profiles.py \
            crumbcontext/providers/anthropic.py \
            crumbcontext/providers/streaming_adapters.py \
            scripts/release-check.py \
            tests/test_anthropic.py tests/test_async_streaming.py \
            tests/test_cli_profiles.py tests/test_fable_mythos.py tests/test_profiles.py
          git diff --cached --check
          git commit -m "Add Claude Fable 5 and Mythos 5 support"
          git push origin HEAD:claude/repo-improvements-fable-mythos-rjp798

  report:
    needs: apply
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: fable-migration-${{ github.sha }}
          path: diagnostic
      - name: Print migration result
        run: |
          log="$(find diagnostic -name fable-migration.log -type f -print -quit)"
          status_file="$(find diagnostic -name fable-migration.status -type f -print -quit)"
          cat "$log"
          status="$(cat "$status_file")"
          echo "exit status: $status"
          test "$status" = "0"
