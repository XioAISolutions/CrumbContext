name: Run complete workload surface

on:
  pull_request:
    paths:
      - scripts/complete_surface.py
      - .github/workflows/run-complete-workload-surface.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  complete:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || 'evidence/multi-workload-suite' }}
          fetch-depth: 0
      - name: Apply permanent surface edits
        run: python scripts/complete_surface.py
      - name: Verify release contract
        run: python scripts/release-check.py
      - name: Capture documentation build
        id: docs
        run: |
          set +e
          python scripts/build_docs.py --out /tmp/crumbcontext-docs --base-path /CrumbContext/ --site-url https://xioaisolutions.github.io > /tmp/docs-build.log 2>&1
          status=$?
          echo "$status" > /tmp/docs-build.status
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload documentation diagnostic
        uses: actions/upload-artifact@v7
        with:
          name: workload-docs-diagnostic-${{ github.sha }}
          path: |
            /tmp/docs-build.log
            /tmp/docs-build.status
          if-no-files-found: error
          retention-days: 3
      - name: Run targeted regression tests
        if: steps.docs.outputs.status == '0'
        run: pytest tests/test_docs_site.py tests/test_workloads.py tests/test_async_streaming.py
      - name: Commit permanent surface changes
        if: steps.docs.outputs.status == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/build_docs.py scripts/release-check.py tests/test_docs_site.py .github/workflows/verify-pypi.yml
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Permanent surface already complete."
            exit 0
          fi
          git commit -m "Complete workload and async release surface"
          git push origin HEAD:evidence/multi-workload-suite

  report:
    needs: complete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: workload-docs-diagnostic-${{ github.sha }}
          path: diagnostic
      - name: Print documentation result
        run: |
          log="$(find diagnostic -name docs-build.log -type f -print -quit)"
          status_file="$(find diagnostic -name docs-build.status -type f -print -quit)"
          cat "$log"
          status="$(cat "$status_file")"
          echo "exit status: $status"
          test "$status" = "0"
