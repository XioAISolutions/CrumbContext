name: Run complete workload surface

on:
  pull_request:
    paths:
      - scripts/workload-surface-trigger.txt
      - .github/workflows/run-complete-workload-surface.yml
      - .github/workflows/complete-workload-surface.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  complete:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || 'evidence/multi-workload-suite' }}
          fetch-depth: 0
      - name: Extract the reviewed completion script
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/complete-workload-surface.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n      - name: Verify the completed release contract"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          Path('/tmp/complete_workload_surface.py').write_text(script, encoding='utf-8')
          PY
      - name: Capture completion result
        id: completion
        run: |
          set +e
          python /tmp/complete_workload_surface.py > /tmp/workload-surface.log 2>&1
          status=$?
          echo "$status" > /tmp/workload-surface.status
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload concise completion result
        uses: actions/upload-artifact@v7
        with:
          name: workload-surface-diagnostic-${{ github.sha }}
          path: |
            /tmp/workload-surface.log
            /tmp/workload-surface.status
          if-no-files-found: error
          retention-days: 3
      - name: Verify permanent project contracts
        if: steps.completion.outputs.status == '0'
        run: |
          python scripts/release-check.py
          python scripts/build_docs.py --out /tmp/crumbcontext-docs --base-path /CrumbContext/ --site-url https://xioaisolutions.github.io
          pytest tests/test_docs_site.py tests/test_workloads.py
      - name: Commit permanent surface changes
        if: steps.completion.outputs.status == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/build_docs.py scripts/release-check.py tests/test_docs_site.py .github/workflows/verify-pypi.yml
          git commit -m "Complete workload and async release surface"
          git push origin HEAD:evidence/multi-workload-suite

  report:
    needs: complete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: workload-surface-diagnostic-${{ github.sha }}
          path: diagnostic
      - name: Print completion result
        run: |
          log="$(find diagnostic -name workload-surface.log -type f -print -quit)"
          status_file="$(find diagnostic -name workload-surface.status -type f -print -quit)"
          echo "--- workload surface completion ---"
          cat "$log"
          status="$(cat "$status_file")"
          echo "exit status: $status"
          test "$status" = "0"
