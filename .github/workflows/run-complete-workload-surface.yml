name: Run complete workload surface

on:
  push:
    branches:
      - evidence/multi-workload-suite
    paths:
      - scripts/workload-surface-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  complete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: evidence/multi-workload-suite
          fetch-depth: 0
      - name: Extract and run the reviewed completion script
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/complete-workload-surface.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n      - name: Verify the completed release contract"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          Path('/tmp/complete_workload_surface.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/complete_workload_surface.py
      - name: Verify permanent project contracts
        run: |
          python scripts/release-check.py
          python scripts/build_docs.py --out /tmp/crumbcontext-docs --base-path /CrumbContext/ --site-url https://xioaisolutions.github.io
          pytest tests/test_docs_site.py tests/test_workloads.py
      - name: Commit permanent surface changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/build_docs.py scripts/release-check.py tests/test_docs_site.py .github/workflows/verify-pypi.yml
          git commit -m "Complete workload and async release surface"
          git push origin HEAD:evidence/multi-workload-suite
