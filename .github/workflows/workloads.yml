name: Workload suite

on:
  push:
    branches: [main]
    paths:
      - crumbcontext/workloads.py
      - crumbcontext/fixtures/workloads/**
      - crumbcontext/schemas.py
      - crumbcontext/cli.py
      - tests/test_workloads.py
      - docs/WORKLOADS.md
      - pyproject.toml
      - .github/workflows/workloads.yml
  pull_request:
    paths:
      - crumbcontext/workloads.py
      - crumbcontext/fixtures/workloads/**
      - crumbcontext/schemas.py
      - crumbcontext/cli.py
      - tests/test_workloads.py
      - docs/WORKLOADS.md
      - pyproject.toml
      - .github/workflows/workloads.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  installed-workload-suite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and install the wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel --outdir /tmp/crumbcontext-wheel
          python -m pip install /tmp/crumbcontext-wheel/*.whl
      - name: Run the bundled suite outside the source tree
        run: |
          cd /tmp
          crumbcontext workloads --out /tmp/crumbcontext-workloads
      - name: Verify the installed workload contract
        run: |
          cd /tmp
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("/tmp/crumbcontext-workloads")
          suite = json.loads((root / "suite.json").read_text(encoding="utf-8"))
          assert suite["schema_version"] == "crumbcontext.workload-suite-result.v1"
          assert suite["passed"] is True
          assert suite["summary"]["workloads"] == 5
          assert suite["summary"]["profiles"] == 4
          assert suite["summary"]["runs"] == 20
          assert suite["summary"]["passed_runs"] == 20
          assert suite["summary"]["exact_anchors_preserved"] == suite["summary"]["exact_anchors_expected"]
          assert {"exact", "cache", "crumb", "image", "summary"} <= set(suite["summary"]["lane_counts"])
          assert len(list((root / "results").glob("*.json"))) == 20
          assert (root / "report.html").is_file()
          assert (root / "share-card.svg").is_file()
          PY
      - name: Run workload source tests
        run: |
          python -m pip install -e '.[dev]'
          pytest tests/test_workloads.py
      - name: Export the Python 3.12 evidence bundle
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: crumbcontext-workload-suite-${{ github.sha }}
          path: /tmp/crumbcontext-workloads/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14
