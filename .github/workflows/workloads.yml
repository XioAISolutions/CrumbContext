name: Workload suite

on:
  push:
    branches:
      - claude/repo-improvements-fable-mythos-rjp798
    paths:
      - scripts/fable-cli-fix-trigger.txt
      - .github/workflows/workloads.yml
  pull_request:
    paths:
      - crumbcontext/cli.py
      - tests/test_fable_mythos.py
      - .github/workflows/workloads.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-cli-fix:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || 'claude/repo-improvements-fable-mythos-rjp798' }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Apply keyword-only and default-profile fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          cli = Path('crumbcontext/cli.py')
          text = cli.read_text(encoding='utf-8')
          old = '''    suite = run_workload_suite(
              out,
              manifest_path=args.manifest,
              profiles=args.profiles,
          )'''.replace('              ', '        ')
          new = '''    suite = run_workload_suite(
              output_dir=out,
              manifest_path=args.manifest,
              profiles=args.profiles,
          )'''.replace('              ', '        ')
          if old in text:
              text = text.replace(old, new, 1)
          elif 'output_dir=out' not in text:
              raise SystemExit('cmd_workloads call target not found')
          text = text.replace(
              '        default=list(available_profiles()),\n        help="Routing profiles to evaluate; defaults to all named profiles",',
              '        default=None,\n        help="Routing profiles to evaluate; defaults to the bundled public profile matrix",',
              1,
          )
          if 'default=None' not in text or 'bundled public profile matrix' not in text:
              raise SystemExit('workload profile default target not found')
          cli.write_text(text, encoding='utf-8')

          tests = Path('tests/test_fable_mythos.py')
          test_text = tests.read_text(encoding='utf-8')
          test_text = test_text.replace(
              'from crumbcontext.cli import _provider_options, build_parser',
              'from crumbcontext.cli import _provider_options, build_parser, cmd_workloads',
              1,
          )
          sentinel = 'def test_workloads_cli_preserves_the_bundled_four_profile_default('
          if sentinel not in test_text:
              test_text += '''


def test_workloads_cli_preserves_the_bundled_four_profile_default(tmp_path, monkeypatch):
    captured = {}

    def fake_run_workload_suite(**kwargs):
        captured.update(kwargs)
        return {
            "passed": True,
            "summary": {
                "passed_runs": 20,
                "runs": 20,
                "workloads": 5,
                "profiles": 4,
                "exact_anchors_preserved": 1,
                "exact_anchors_expected": 1,
                "lane_counts": {},
            },
        }

    monkeypatch.setattr("crumbcontext.cli.run_workload_suite", fake_run_workload_suite)
    args = build_parser().parse_args(["workloads", "--out", str(tmp_path)])
    assert args.profiles is None
    assert cmd_workloads(args) == 0
    assert captured == {
        "output_dir": tmp_path,
        "manifest_path": None,
        "profiles": None,
    }
'''
          tests.write_text(test_text, encoding='utf-8')
          PY
      - name: Verify focused regression
        run: |
          python -m pip install -e '.[dev]'
          pytest tests/test_fable_mythos.py
          crumbcontext workloads --out /tmp/crumbcontext-workloads
          python - <<'PY'
          import json
          suite = json.load(open('/tmp/crumbcontext-workloads/suite.json'))
          assert suite['passed']
          assert suite['summary']['profiles'] == 4
          assert suite['summary']['runs'] == 20
          PY
      - name: Commit permanent CLI fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crumbcontext/cli.py tests/test_fable_mythos.py
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'CLI regression fix already applied.'
            exit 0
          fi
          git commit -m 'Preserve the default workload profile matrix'
          git push origin HEAD:claude/repo-improvements-fable-mythos-rjp798
