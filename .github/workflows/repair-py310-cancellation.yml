name: Repair Python 3.10 cancellation compatibility

on:
  push:
    branches:
      - api/async-streaming
    paths:
      - .github/workflows/repair-py310-cancellation.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: api/async-streaming
          fetch-depth: 0
      - name: Preserve typed partial-result cancellation on Python 3.10
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crumbcontext/providers/async_base.py")
          text = path.read_text(encoding="utf-8")
          old = "class ProviderStreamCancelled(asyncio.CancelledError):"
          new = "class ProviderStreamCancelled(RuntimeError):"
          if text.count(old) != 1:
              raise SystemExit("expected cancellation exception declaration was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit compatibility repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crumbcontext/providers/async_base.py
          git commit -m "Preserve typed cancellation results on Python 3.10"
          git push origin HEAD:api/async-streaming
