name: Apply Fable and Mythos support

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'claude/repo-improvements-fable-mythos-rjp798'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Read and apply the reviewed payload
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" > /tmp/pr-comments.json
          python - <<'PY'
          from __future__ import annotations

          import base64
          import io
          import json
          import lzma
          import re
          import tarfile
          from pathlib import Path, PurePosixPath

          comments = json.loads(Path('/tmp/pr-comments.json').read_text(encoding='utf-8'))
          pattern = re.compile(
              r'<!-- FABLE64_CHUNK (\d+)/(\d+) -->(.*?)<!-- FABLE64_CHUNK_END -->',
              flags=re.DOTALL,
          )
          chunks: dict[int, str] = {}
          expected_total: int | None = None
          for comment in comments:
              body = comment.get('body') if isinstance(comment, dict) else None
              if not isinstance(body, str):
                  continue
              match = pattern.search(body)
              if not match:
                  continue
              index = int(match.group(1))
              total = int(match.group(2))
              if expected_total is None:
                  expected_total = total
              if total != expected_total or index in chunks:
                  raise SystemExit('inconsistent or duplicate Fable/Mythos payload chunks')
              chunks[index] = ''.join(match.group(3).split())
          if expected_total is None or set(chunks) != set(range(1, expected_total + 1)):
              raise SystemExit(
                  f'incomplete Fable/Mythos payload chunks: have={sorted(chunks)}, total={expected_total}'
              )
          encoded = ''.join(chunks[index] for index in range(1, expected_total + 1))
          archive = lzma.decompress(base64.b64decode(encoded, validate=True))
          allowed = {
              'CHANGELOG.md',
              'README.md',
              'ROADMAP.md',
              'crumbcontext/cli.py',
              'crumbcontext/profiles.py',
              'crumbcontext/providers/anthropic.py',
              'crumbcontext/providers/streaming_adapters.py',
              'crumbcontext/workloads.py',
              'docs/ANTHROPIC.md',
              'docs/ROUTING_PROFILES.md',
              'examples/python/build_anthropic_payload.py',
              'tests/test_anthropic.py',
              'tests/test_async_streaming.py',
              'tests/test_cli_profiles.py',
              'tests/test_profiles.py',
          }
          root = Path.cwd().resolve()
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:') as bundle:
              members = bundle.getmembers()
              names = {member.name for member in members}
              if names != allowed:
                  raise SystemExit(f'payload path set mismatch: {sorted(names ^ allowed)}')
              for member in members:
                  path = PurePosixPath(member.name)
                  if member.isdir() or path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'unsafe payload member: {member.name}')
                  source = bundle.extractfile(member)
                  if source is None:
                      raise SystemExit(f'payload member has no file data: {member.name}')
                  target = (root / member.name).resolve()
                  if root not in target.parents:
                      raise SystemExit(f'payload member escapes repository: {member.name}')
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(source.read())
          print(f'applied {len(allowed)} reviewed files from {expected_total} chunks')
          PY
      - name: Install offline validation dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run complete offline test suite
        run: python -m pytest
      - name: Run deterministic benchmark
        run: |
          crumbcontext benchmark --out /tmp/fable-proof
          python -c "import json; r=json.load(open('/tmp/fable-proof/benchmark.json')); assert r['passed']; assert r['exact_anchors_preserved'] == r['exact_anchors_expected']"
      - name: Inspect Anthropic payload contract
        run: |
          python examples/python/build_anthropic_payload.py --out /tmp/fable-payload > /tmp/fable-payload.json
          python - <<'PY'
          import json
          value = json.load(open('/tmp/fable-payload.json'))
          blocks = list(value.get('system', [])) + [part for message in value['messages'] for part in message['content']]
          assert value['model'] == 'claude-fable-5'
          assert value['fallbacks'] == [{'model': 'claude-opus-4-8'}]
          assert sum('cache_control' in block for block in blocks) <= 4
          PY
      - name: Validate frontier vision plan
        run: |
          crumbcontext demo --out /tmp/fable-demo --profile frontier-vision
          crumbcontext analyze /tmp/fable-demo/demo-input.json --profile frontier-vision > /tmp/frontier-plan.json
          python - <<'PY'
          import json
          value = json.load(open('/tmp/frontier-plan.json'))
          config = value['routing']['config']
          assert value['routing']['profile'] == 'frontier-vision'
          assert config['image_width'] == 2576
          assert config['image_height'] == 1196
          assert config['image_page_chars'] == 24000
          PY
      - name: Commit the verified implementation
        run: |
          git add CHANGELOG.md README.md ROADMAP.md crumbcontext docs examples tests
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Reviewed Fable/Mythos files are already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Add first-class Claude Fable 5 and Mythos 5 support'
          git push origin HEAD:claude/repo-improvements-fable-mythos-rjp798
