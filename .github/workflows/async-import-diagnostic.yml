name: Async import diagnostic

on:
  pull_request:
    paths:
      - .github/workflows/async-import-diagnostic.yml
      - crumbcontext/async_api.py
      - crumbcontext/providers/async_*.py
      - crumbcontext/providers/sse.py
      - crumbcontext/providers/streaming_adapters.py
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build and install wheel outside source tree
        run: |
          python -m pip install --upgrade build >/tmp/pip-build.log 2>&1
          python -m build --wheel --outdir /tmp/crumbcontext-wheel >/tmp/wheel-build.log 2>&1
          python -m pip install /tmp/crumbcontext-wheel/*.whl >/tmp/wheel-install.log 2>&1
      - name: Capture installed async export contract
        run: |
          cd /tmp
          set +e
          python - <<'PY' > async-import.log 2>&1
          import crumbcontext.async_api as api

          print("module:", api.__file__)
          print("exports:", api.__all__)
          missing = [name for name in api.__all__ if not hasattr(api, name)]
          print("missing:", missing)
          required = {
              "AnthropicStreamingProvider",
              "MockStreamingProvider",
              "OpenAIStreamingProvider",
              "ProviderStreamCancelled",
              "ProviderStreamError",
              "StreamEvent",
              "StreamResult",
              "collect_stream",
              "decode_sse",
              "execute_named_provider_async",
              "execute_provider_stream",
          }
          print("required missing:", sorted(required - set(api.__all__)))
          assert not missing
          assert required <= set(api.__all__)
          PY
          echo $? > async-import.status
          exit 0
      - name: Upload concise diagnostic
        uses: actions/upload-artifact@v7
        with:
          name: async-import-diagnostic-${{ github.sha }}
          path: |
            /tmp/async-import.log
            /tmp/async-import.status
          if-no-files-found: error
          retention-days: 3

  report:
    needs: capture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: async-import-diagnostic-${{ github.sha }}
          path: diagnostic
      - name: Print installed async export contract
        run: |
          log="$(find diagnostic -name async-import.log -type f -print -quit)"
          status_file="$(find diagnostic -name async-import.status -type f -print -quit)"
          cat "$log"
          status="$(cat "$status_file")"
          echo "exit status: $status"
          test "$status" = "0"
