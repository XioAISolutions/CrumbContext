name: Provider benchmark

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Provider adapter to measure
        required: true
        type: choice
        options:
          - anthropic
          - openai
      model:
        description: Exact provider model identifier
        required: true
        type: string
      profile:
        description: Named routing policy recorded in the evidence bundle
        required: true
        default: safe-default
        type: choice
        options:
          - safe-default
          - text-only
          - cache-heavy
          - strict-exact
      no_images:
        description: Force text-only routing in addition to the selected profile
        required: true
        default: false
        type: boolean
      recent_turns:
        description: Optional exact-lane override; leave blank to use the profile default
        required: false
        default: ""
        type: string
      redact_responses:
        description: Omit provider response bodies from saved JSON and HTML
        required: true
        default: true
        type: boolean
      run_label:
        description: Short evidence label, such as sonnet-text-only
        required: true
        type: string
  pull_request:
    paths:
      - .github/workflows/provider-benchmark.yml
      - crumbcontext/evidence.py
      - crumbcontext/profiles.py
      - crumbcontext/schemas.py
      - tests/test_evidence.py
      - tests/test_profiles.py
      - tests/test_schemas.py
      - tests/test_redaction.py

permissions:
  contents: read

jobs:
  contract:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Verify provider evidence, profiles, schemas, and redaction contracts
        run: >-
          pytest
          tests/test_evidence.py
          tests/test_profiles.py
          tests/test_schemas.py
          tests/test_redaction.py

  benchmark:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: provider-benchmarks
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PROVIDER: ${{ inputs.provider }}
      MODEL: ${{ inputs.model }}
      PROFILE: ${{ inputs.profile }}
      NO_IMAGES: ${{ inputs.no_images }}
      RECENT_TURNS: ${{ inputs.recent_turns }}
      REDACT_RESPONSES: ${{ inputs.redact_responses }}
      RUN_LABEL: ${{ inputs.run_label }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install the repository package
        run: python -m pip install .
      - name: Validate the guarded benchmark request
        run: |
          if [[ -n "$RECENT_TURNS" && ! "$RECENT_TURNS" =~ ^[0-9]+$ ]]; then
            echo "recent_turns must be blank or a non-negative integer" >&2
            exit 1
          fi
          if [[ ! "$RUN_LABEL" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "run_label may contain only letters, numbers, dot, underscore, and hyphen" >&2
            exit 1
          fi
          case "$PROVIDER" in
            anthropic)
              test -n "$ANTHROPIC_API_KEY" || { echo "ANTHROPIC_API_KEY is not configured in provider-benchmarks" >&2; exit 1; }
              ;;
            openai)
              test -n "$OPENAI_API_KEY" || { echo "OPENAI_API_KEY is not configured in provider-benchmarks" >&2; exit 1; }
              ;;
            *)
              echo "unsupported provider: $PROVIDER" >&2
              exit 1
              ;;
          esac
          test -n "$MODEL" || { echo "an exact model identifier is required" >&2; exit 1; }
      - name: Run the same-request provider counterfactual
        run: |
          args=(
            counterfactual
            --provider "$PROVIDER"
            --model "$MODEL"
            --profile "$PROFILE"
            --max-tokens 1024
            --timeout 180
            --out provider-proof
          )
          if [[ -n "$RECENT_TURNS" ]]; then
            args+=(--recent-turns "$RECENT_TURNS")
          fi
          if [[ "$NO_IMAGES" == "true" ]]; then
            args+=(--no-images)
          fi
          if [[ "$REDACT_RESPONSES" == "true" ]]; then
            args+=(--redact-responses)
          fi
          crumbcontext "${args[@]}"
      - name: Validate measured evidence, recall, hashes, schema, and credential safety
        run: |
          python -m crumbcontext.evidence \
            --report provider-proof/counterfactual.json \
            --artifact-root provider-proof \
            --provider "$PROVIDER" \
            --requested-model "$MODEL" \
            --summary "$GITHUB_STEP_SUMMARY"
      - name: Export reproducible provider evidence
        uses: actions/upload-artifact@v7
        with:
          name: provider-proof-${{ inputs.provider }}-${{ inputs.profile }}-${{ inputs.run_label }}-${{ github.run_id }}
          path: provider-proof/
          if-no-files-found: error
          retention-days: 90
