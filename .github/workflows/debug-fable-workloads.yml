name: Diagnose Fable workload wheel

on:
  pull_request:
    paths:
      - .github/workflows/debug-fable-workloads.yml
      - crumbcontext/workloads.py
      - crumbcontext/profiles.py

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build and install wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel --outdir /tmp/crumbcontext-wheel
          python -m pip install /tmp/crumbcontext-wheel/*.whl
      - name: Capture workload command
        run: |
          set +e
          cd /tmp
          crumbcontext workloads --out /tmp/crumbcontext-workloads > /tmp/workload.log 2>&1
          status=$?
          cat /tmp/workload.log
          echo "diagnostic exit status: $status"
          exit "$status"
