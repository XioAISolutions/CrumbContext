name: Repair documentation release contract

on:
  push:
    branches:
      - docs/github-pages-site
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: docs/github-pages-site
          fetch-depth: 0
      - name: Align release contract with path-safe asset construction
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/release-check.py")
          text = path.read_text(encoding="utf-8")
          updated = text.replace(
              '            "docs/site-assets/site.css",\n'
              '            "docs/site-assets/site.js",\n',
              '            \'ROOT / "docs" / "site-assets" / "site.css"\',\n'
              '            \'ROOT / "docs" / "site-assets" / "site.js"\',\n',
          )
          if updated == text:
              raise SystemExit("expected brittle asset fragments were not found")
          path.write_text(updated, encoding="utf-8")
          PY
      - name: Commit contract repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/release-check.py
          git commit -m "Align documentation asset contract"
          git push origin HEAD:docs/github-pages-site
