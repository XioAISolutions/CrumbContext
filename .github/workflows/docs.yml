name: Documentation site

on:
  push:
    branches: [main]
    paths:
      - README.md
      - ROADMAP.md
      - SECURITY.md
      - CONTRIBUTING.md
      - docs/**
      - scripts/build_docs.py
      - tests/test_docs_site.py
      - pyproject.toml
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - README.md
      - ROADMAP.md
      - SECURITY.md
      - CONTRIBUTING.md
      - docs/**
      - scripts/build_docs.py
      - tests/test_docs_site.py
      - pyproject.toml
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install documentation dependencies
        run: python -m pip install -e '.[docs]' pytest
      - name: Build and validate the static site
        run: >-
          python scripts/build_docs.py
          --out _site
          --base-path /CrumbContext/
          --site-url https://xioaisolutions.github.io
      - name: Run documentation-site tests
        run: pytest tests/test_docs_site.py
      - name: Upload pull-request preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: crumbcontext-docs-preview-${{ github.sha }}
          path: _site/
          if-no-files-found: error
          retention-days: 14
      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site/
          retention-days: 1

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy documentation to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
