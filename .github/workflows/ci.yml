name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Verify release metadata and documentation contract
        run: python scripts/release-check.py
      - name: Compile package and release scripts
        run: python -m compileall -q crumbcontext scripts
      - name: Run pytest
        run: |
          if ! pytest > /tmp/pytest.log 2>&1; then
            cat /tmp/pytest.log
            exit 1
          fi
          tail -n 20 /tmp/pytest.log
      - run: crumbcontext benchmark --out /tmp/crumbcontext-proof
      - run: test -f /tmp/crumbcontext-proof/report.html
      - run: test -f /tmp/crumbcontext-proof/share-card.svg
      - run: python -c "import json; assert json.load(open('/tmp/crumbcontext-proof/benchmark.json'))['passed']"
      - run: crumbcontext counterfactual --provider mock --out /tmp/crumbcontext-counterfactual
      - run: test -f /tmp/crumbcontext-counterfactual/counterfactual.html
      - run: test -f /tmp/crumbcontext-counterfactual/counterfactual-card.svg
      - run: python -c "import json; assert json.load(open('/tmp/crumbcontext-counterfactual/counterfactual.json'))['passed']"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - name: Verify release contract
        run: python scripts/release-check.py
      - name: Read package version
        id: package
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path
          print(f"version={tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version']}")
          PY
      - name: Build distributions
        run: python -m build --outdir python-dist
      - name: Validate distributions
        run: python -m twine check python-dist/*
      - name: Smoke-test the installed wheel outside the source tree
        env:
          EXPECTED_VERSION: ${{ steps.package.outputs.version }}
        run: |
          python -m venv /tmp/crumbcontext-wheel
          /tmp/crumbcontext-wheel/bin/python -m pip install --upgrade pip
          /tmp/crumbcontext-wheel/bin/python -m pip install python-dist/*.whl
          cd /tmp
          /tmp/crumbcontext-wheel/bin/crumbcontext --version
          /tmp/crumbcontext-wheel/bin/crumbcontext benchmark --out wheel-proof
          /tmp/crumbcontext-wheel/bin/crumbcontext counterfactual --provider mock --out wheel-counterfactual
          /tmp/crumbcontext-wheel/bin/python -c "import importlib.metadata as m, os; assert m.version('crumb-context') == os.environ['EXPECTED_VERSION']"
          /tmp/crumbcontext-wheel/bin/python -c "import json; assert json.load(open('/tmp/wheel-proof/benchmark.json'))['passed']"
          /tmp/crumbcontext-wheel/bin/python -c "import json; assert json.load(open('/tmp/wheel-counterfactual/counterfactual.json'))['passed']"
      - name: Build release checksums, manifest, and SPDX SBOM
        run: |
          CREATED="$(git show -s --format=%cI HEAD)"
          python scripts/release_assets.py \
            --input python-dist \
            --output release-dist \
            --tag "v${{ steps.package.outputs.version }}" \
            --commit "${{ github.sha }}" \
            --created "$CREATED"
      - name: Verify release checksums and machine-readable assets
        env:
          EXPECTED_VERSION: ${{ steps.package.outputs.version }}
        run: |
          cd release-dist
          sha256sum --check SHA256SUMS.txt
          python -c "import json, os; data=json.load(open(f'crumb-context-{os.environ[\"EXPECTED_VERSION\"]}-release-manifest.json')); assert data['version'] == os.environ['EXPECTED_VERSION']; assert len(data['artifacts']) == 2"
          python -c "import json, os; data=json.load(open(f'crumb-context-{os.environ[\"EXPECTED_VERSION\"]}.spdx.json')); assert data['spdxVersion'] == 'SPDX-2.3'; assert data['packages'][0]['versionInfo'] == os.environ['EXPECTED_VERSION']"
      - name: Export verified release candidate
        uses: actions/upload-artifact@v7
        with:
          name: crumb-context-${{ steps.package.outputs.version }}-release-candidate-${{ github.sha }}
          path: release-dist/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
