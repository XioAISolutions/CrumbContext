name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Verify release metadata and documentation contract
        run: python scripts/release-check.py
      - name: Compile package
        run: python -m compileall -q crumbcontext
      - run: pytest
      - run: crumbcontext benchmark --out /tmp/crumbcontext-proof
      - run: test -f /tmp/crumbcontext-proof/report.html
      - run: test -f /tmp/crumbcontext-proof/share-card.svg
      - run: python -c "import json; assert json.load(open('/tmp/crumbcontext-proof/benchmark.json'))['passed']"
      - run: crumbcontext counterfactual --provider mock --out /tmp/crumbcontext-counterfactual
      - run: test -f /tmp/crumbcontext-counterfactual/counterfactual.html
      - run: test -f /tmp/crumbcontext-counterfactual/counterfactual-card.svg
      - run: python -c "import json; assert json.load(open('/tmp/crumbcontext-counterfactual/counterfactual.json'))['passed']"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - name: Verify release contract
        run: python scripts/release-check.py
      - name: Build distributions
        run: python -m build
      - name: Validate distributions
        run: python -m twine check dist/*
      - name: Smoke-test the installed wheel outside the source tree
        run: |
          python -m venv /tmp/crumbcontext-wheel
          /tmp/crumbcontext-wheel/bin/python -m pip install --upgrade pip
          /tmp/crumbcontext-wheel/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/crumbcontext-wheel/bin/crumbcontext --version
          /tmp/crumbcontext-wheel/bin/crumbcontext benchmark --out wheel-proof
          /tmp/crumbcontext-wheel/bin/crumbcontext counterfactual --provider mock --out wheel-counterfactual
          /tmp/crumbcontext-wheel/bin/python -c "import importlib.metadata as m; assert m.version('crumb-context') == '0.1.0'"
          /tmp/crumbcontext-wheel/bin/python -c "import json; assert json.load(open('/tmp/wheel-proof/benchmark.json'))['passed']"
          /tmp/crumbcontext-wheel/bin/python -c "import json; assert json.load(open('/tmp/wheel-counterfactual/counterfactual.json'))['passed']"
